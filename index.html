<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تويتي فون الزعفرانية</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

:root {
  --primary: #f9a825;      /* أصفر غامق */
  --primary2: #f57f17;     /* أصفر أغمق */
  --accent: #ff6f00;       /* برتقالي */
  --accent2: #ffab00;      /* أصفر فاتح */
  --bg: #fff8e1;           /* خلفية صفراء فاتحة */
  --card: #ffffff;
  --text: #1a1a1a;
  --muted: #6d4c41;
  --border: #ffcc80;
  --success: #2e7d32;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Cairo',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* SPLASH */
#splash {
  position:fixed; inset:0; background:linear-gradient(135deg,#f9a825,#f57f17,#ff6f00);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:9999; transition:opacity 0.6s;
}
#splash.hide { opacity:0; pointer-events:none; }
.splash-logo { font-size:3rem; font-weight:900; color:#fff; margin-bottom:8px; }
.splash-sub { color:#fff3e0; font-size:1rem; margin-bottom:30px; }
.splash-spinner {
  width:40px; height:40px; border:3px solid #ffffff22;
  border-top-color:#fff; border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* HEADER */
header {
  background:linear-gradient(135deg,#f9a825,#f57f17);
  color:white; padding:0 16px;
  position:sticky; top:0; z-index:100;
  box-shadow:0 2px 20px #0008;
}
.header-inner {
  max-width:1200px; margin:auto;
  display:flex; align-items:center; justify-content:space-between;
  height:62px; gap:10px;
}
.logo-wrap { display:flex; align-items:center; gap:8px; cursor:pointer; }
.logo-img { height:40px; width:auto; border-radius:8px; object-fit:contain; background:#fff8e1; padding:2px; }
.logo-text { line-height:1.2; }
.logo-text .main { font-size:1.1rem; font-weight:900; color:#fff; white-space:nowrap; }
.logo-text .sub { display:block; font-size:0.65rem; color:#fff3e0; font-weight:400; }
.search-bar { flex:1; max-width:380px; }
.search-bar input {
  width:100%; padding:8px 16px; border-radius:24px;
  border:none; font-family:'Cairo',sans-serif; font-size:0.88rem;
  outline:none; background:#ffffff25; color:#fff;
}
.search-bar input::placeholder { color:#ddd; }
.header-actions { display:flex; gap:7px; align-items:center; }
.cart-btn {
  background:linear-gradient(135deg,#ff6f00,#e65100); border:none; color:white;
  border-radius:24px; padding:7px 14px;
  font-family:'Cairo',sans-serif; font-size:0.85rem; font-weight:700;
  cursor:pointer; display:flex; align-items:center; gap:5px;
  transition:all 0.2s; white-space:nowrap; box-shadow:0 2px 8px #ff6f0040;
}
.cart-btn:hover { transform:translateY(-1px); box-shadow:0 4px 14px #ff6f0060; }
.cart-count {
  background:#d32f2f; color:white; border-radius:50%;
  width:20px; height:20px; display:flex; align-items:center;
  justify-content:center; font-size:0.72rem; font-weight:900;
}
.admin-btn {
  background:transparent; border:1px solid #ffffff44; color:#fff;
  border-radius:24px; padding:7px 12px;
  font-family:'Cairo',sans-serif; font-size:0.8rem; cursor:pointer;
  transition:all 0.2s;
}
.admin-btn:hover { background:#ffffff20; }

/* HERO */
.hero {
  background:linear-gradient(135deg,#f9a825 0%,#f57f17 50%,#ff6f00 100%);
  color:white; text-align:center; padding:50px 20px; position:relative; overflow:hidden;
}
.hero::before {
  content:''; position:absolute; inset:0;
  background:radial-gradient(ellipse at center,#ffffff20 0%,transparent 70%);
}
.hero-icon { font-size:3.5rem; margin-bottom:10px; animation:float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.hero h1 { font-size:1.8rem; font-weight:900; margin-bottom:6px; position:relative; color:#fff; }
.hero h1 span { color:#fff8e1; }
.hero p { color:#fff3e0; font-size:0.95rem; position:relative; }
.hero-stats {
  display:flex; justify-content:center; gap:24px; margin-top:20px; position:relative;
}
.hero-stat { text-align:center; }
.hero-stat-num { font-size:1.4rem; font-weight:900; color:#fff8e1; }
.hero-stat-label { font-size:0.72rem; color:#fff3e0; }

/* SOCIAL LINKS IN HERO */
.social-links {
  display:flex; justify-content:center; gap:12px; margin-top:22px; flex-wrap:wrap;
}
.social-btn {
  display:inline-flex; align-items:center; gap:6px;
  background:#ffffff20; backdrop-filter:blur(4px);
  padding:8px 16px; border-radius:30px; color:white;
  text-decoration:none; font-weight:700; font-size:0.85rem;
  transition:all 0.2s; border:1px solid #ffffff30;
}
.social-btn:hover { background:#ffffff40; transform:scale(1.05); }
.social-btn .icon { font-size:1.2rem; }

/* ADDRESS BAR */
.address-bar {
  background:linear-gradient(135deg,#ff6f00,#e65100); color:white;
  text-align:center; padding:7px 20px; font-size:0.82rem;
  display:none; cursor:pointer; transition:opacity 0.2s;
}
.address-bar.visible { display:block; }
.address-bar:hover { opacity:0.9; }

/* MAIN */
.main { max-width:1200px; margin:24px auto; padding:0 14px; }

.category-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
.cat-btn {
  padding:7px 18px; border-radius:20px; border:1.5px solid var(--border);
  background:white; font-family:'Cairo',sans-serif; font-size:0.85rem;
  cursor:pointer; transition:all 0.2s; color:var(--text); font-weight:600;
  box-shadow:0 1px 4px #0001;
}
.cat-btn.active, .cat-btn:hover {
  background:linear-gradient(135deg,#f9a825,#f57f17); color:white;
  border-color:transparent; box-shadow:0 3px 10px #f9a82550;
}

.section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.section-title {
  font-size:1.15rem; font-weight:900;
  color:var(--primary2); border-right:4px solid #f9a825; padding-right:10px;
}
.products-count { font-size:0.82rem; color:var(--muted); background:white; padding:4px 10px; border-radius:12px; }

.product-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:16px;
}
.product-card {
  background:white; border-radius:18px; overflow:hidden;
  box-shadow:0 2px 12px #0001; transition:all 0.25s;
  cursor:pointer; position:relative;
  animation:fadeUp 0.4s ease both;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.product-card:hover { transform:translateY(-5px); box-shadow:0 12px 28px #f9a82530; }
.product-img { width:100%; height:185px; object-fit:cover; background:#f0f4f8; display:block; }
.product-img-placeholder {
  width:100%; height:185px; background:linear-gradient(135deg,#f0f4f8,#e0e8f0);
  display:flex; align-items:center; justify-content:center; font-size:3.5rem;
}
.product-info { padding:12px; }
.product-name { font-size:0.92rem; font-weight:700; margin-bottom:2px; color:var(--text); line-height:1.3; }
.product-cat { font-size:0.72rem; color:var(--muted); margin-bottom:8px; }
.product-footer { display:flex; align-items:center; justify-content:space-between; }
.product-price { font-size:1rem; font-weight:900; color:#f57f17; }
.add-btn {
  background:linear-gradient(135deg,#f9a825,#f57f17); color:white; border:none;
  border-radius:10px; padding:6px 12px;
  font-family:'Cairo',sans-serif; font-size:0.8rem; font-weight:700;
  cursor:pointer; transition:all 0.2s;
}
.add-btn:hover { background:linear-gradient(135deg,#ff6f00,#e65100); transform:scale(1.05); }
.badge {
  position:absolute; top:8px; right:8px;
  background:linear-gradient(135deg,#d32f2f,#b71c1c); color:white;
  border-radius:8px; padding:3px 8px; font-size:0.7rem; font-weight:700;
}
.no-products { text-align:center; color:var(--muted); padding:60px 20px; grid-column:1/-1; }

/* CONTACT SECTION */
.contact-section {
  background:linear-gradient(135deg,#f9a825,#f57f17);
  border-radius:20px; padding:24px; margin-top:32px; color:white; text-align:center;
}
.contact-title { font-size:1.1rem; font-weight:900; color:#fff; margin-bottom:16px; }
.contact-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.contact-item {
  background:#ffffff15; border-radius:12px; padding:14px;
  display:flex; flex-direction:column; align-items:center; gap:6px;
}
.contact-icon { font-size:1.6rem; }
.contact-label { font-size:0.72rem; color:#fff3e0; }
.contact-value { font-size:0.88rem; font-weight:700; color:white; }
.whatsapp-btn {
  margin-top:16px; width:100%; padding:12px;
  background:linear-gradient(135deg,#25d366,#128c7e); color:white; border:none;
  border-radius:14px; font-family:'Cairo',sans-serif; font-size:0.95rem; font-weight:700;
  cursor:pointer; transition:all 0.2s; box-shadow:0 4px 14px #25d36640;
}
.whatsapp-btn:hover { transform:translateY(-2px); box-shadow:0 6px 18px #25d36660; }

/* MODALS */
.modal-overlay {
  position:fixed; inset:0; background:#000a; z-index:200;
  display:flex; align-items:center; justify-content:center; padding:14px;
  opacity:0; pointer-events:none; transition:opacity 0.22s;
}
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal {
  background:white; border-radius:22px; padding:24px;
  width:100%; max-width:480px; max-height:92vh; overflow-y:auto;
  transform:translateY(30px) scale(0.97); transition:all 0.25s; position:relative;
}
.modal-overlay.open .modal { transform:translateY(0) scale(1); }
.modal-title {
  font-size:1.15rem; font-weight:900; color:var(--primary2);
  margin-bottom:18px; border-bottom:2px solid var(--border); padding-bottom:10px;
}
.close-btn {
  position:absolute; top:14px; left:14px;
  background:#f0f4f8; border:none; border-radius:50%;
  width:32px; height:32px; font-size:1rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center; color:var(--text);
  transition:all 0.18s;
}
.close-btn:hover { background:#f9a825; color:white; }

/* DETAIL */
.detail-img { width:100%; height:260px; object-fit:cover; border-radius:14px; margin-bottom:14px; }
.detail-name { font-size:1.25rem; font-weight:900; color:var(--primary2); margin-bottom:4px; }
.detail-cat {
  display:inline-block; background:#f0f4f8; color:var(--muted);
  padding:3px 10px; border-radius:10px; font-size:0.78rem; margin-bottom:10px;
}
.detail-desc { color:#555; line-height:1.8; margin-bottom:14px; font-size:0.9rem; }
.detail-price { font-size:1.8rem; font-weight:900; color:#f57f17; margin-bottom:18px; }
.detail-actions { display:flex; gap:10px; }
.detail-actions .submit-btn { flex:1; }
.ws-detail-btn {
  padding:12px 16px; background:linear-gradient(135deg,#25d366,#128c7e);
  color:white; border:none; border-radius:12px; cursor:pointer;
  font-family:'Cairo',sans-serif; font-size:0.88rem; font-weight:700;
  transition:all 0.2s;
}
.ws-detail-btn:hover { transform:translateY(-1px); }

/* FORM */
.form-group { margin-bottom:14px; }
.form-group label { display:block; font-size:0.86rem; font-weight:700; color:var(--primary2); margin-bottom:5px; }
.form-group input, .form-group select, .form-group textarea {
  width:100%; padding:9px 13px; border:1.5px solid var(--border);
  border-radius:10px; font-family:'Cairo',sans-serif; font-size:0.9rem;
  outline:none; transition:border-color 0.18s; color:var(--text); background:white;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:#f9a825; box-shadow:0 0 0 3px #f9a82530; }
.form-group textarea { resize:vertical; min-height:70px; }

.upload-area {
  border:2px dashed var(--border); border-radius:12px;
  padding:20px; text-align:center; cursor:pointer;
  transition:all 0.2s; background:#fafbff; position:relative;
}
.upload-area:hover { border-color:#f9a825; background:#fff8e1; }
.upload-area input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.upload-icon { font-size:2rem; margin-bottom:6px; }
.upload-text { font-size:0.82rem; color:var(--muted); }
.img-preview-box { width:100%; height:160px; object-fit:cover; border-radius:12px; margin-top:8px; display:none; border:2px solid var(--border); }
.upload-progress { height:5px; background:#eee; border-radius:4px; margin-top:8px; display:none; overflow:hidden; }
.upload-progress-bar { height:100%; background:linear-gradient(90deg,#f9a825,#f57f17); border-radius:4px; transition:width 0.3s; width:0%; }

.submit-btn {
  width:100%; padding:12px; background:linear-gradient(135deg,#f9a825,#f57f17); color:white;
  border:none; border-radius:12px; font-family:'Cairo',sans-serif;
  font-size:0.95rem; font-weight:700; cursor:pointer; transition:all 0.2s;
}
.submit-btn:hover { background:linear-gradient(135deg,#ff6f00,#e65100); transform:translateY(-1px); }
.submit-btn:disabled { background:#aaa; cursor:not-allowed; transform:none; }

/* CART */
.cart-item { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); }
.cart-item-img { width:52px; height:52px; object-fit:cover; border-radius:10px; background:#f0f4f8; flex-shrink:0; }
.cart-item-info { flex:1; }
.cart-item-name { font-weight:700; font-size:0.88rem; }
.cart-item-price { color:#f57f17; font-weight:700; font-size:0.82rem; }
.cart-qty { display:flex; align-items:center; gap:5px; }
.qty-btn {
  background:#f0f4f8; border:1.5px solid var(--border); border-radius:7px;
  width:26px; height:26px; cursor:pointer; font-size:1rem;
  display:flex; align-items:center; justify-content:center; transition:all 0.15s;
}
.qty-btn:hover { background:#f9a825; color:white; border-color:#f9a825; }
.cart-total {
  margin-top:14px; display:flex; justify-content:space-between;
  align-items:center; font-size:1.05rem; font-weight:900;
  padding:12px; border-radius:12px;
  background:linear-gradient(135deg,#f0f4f8,#e0e8f0);
}
.checkout-btn {
  width:100%; padding:13px; background:linear-gradient(135deg,#25d366,#128c7e); color:white;
  border:none; border-radius:12px; font-family:'Cairo',sans-serif;
  font-size:0.95rem; font-weight:700; cursor:pointer; margin-top:12px;
  transition:all 0.2s; box-shadow:0 3px 10px #25d36640;
}
.checkout-btn:hover { transform:translateY(-1px); box-shadow:0 5px 14px #25d36660; }
.empty-cart { text-align:center; color:var(--muted); padding:40px 0; }

/* ADMIN */
.tabs { display:flex; gap:4px; margin-bottom:16px; border-bottom:2px solid var(--border); }
.tab-btn {
  background:none; border:none; font-family:'Cairo',sans-serif;
  font-size:0.85rem; font-weight:700; padding:8px 12px; cursor:pointer;
  color:var(--muted); border-bottom:2px solid transparent; margin-bottom:-2px;
  transition:all 0.18s;
}
.tab-btn.active { color:#f57f17; border-bottom-color:#f57f17; }
.admin-product-row { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); }
.admin-product-img { width:46px; height:46px; object-fit:cover; border-radius:9px; background:#f0f4f8; flex-shrink:0; }
.admin-product-info { flex:1; }
.admin-product-name { font-weight:700; font-size:0.86rem; }
.admin-product-price { color:#f57f17; font-size:0.8rem; }
.delete-btn {
  background:#fff0f0; border:1.5px solid #ffcccc; border-radius:8px;
  padding:5px 10px; color:#d32f2f;
  font-family:'Cairo',sans-serif; font-size:0.78rem; cursor:pointer;
  transition:all 0.15s; flex-shrink:0;
}
.delete-btn:hover { background:#d32f2f; color:white; border-color:#d32f2f; }
.settings-box { background:#fff8e1; border-radius:14px; padding:14px; margin-bottom:16px; border:1.5px solid var(--border); }
.admin-login-box { text-align:center; padding:10px 0 20px; }
.admin-login-box p { color:var(--muted); margin-bottom:14px; font-size:0.88rem; }
.admin-login-box input {
  width:100%; padding:12px 14px; border:1.5px solid var(--border);
  border-radius:12px; font-family:'Cairo',sans-serif; font-size:1.1rem;
  outline:none; margin-bottom:12px; text-align:center; letter-spacing:6px;
}

/* TOAST */
.toast {
  position:fixed; bottom:80px; left:50%;
  transform:translateX(-50%) translateY(80px);
  background:linear-gradient(135deg,#f9a825,#f57f17); color:white;
  padding:11px 22px; border-radius:24px;
  font-family:'Cairo',sans-serif; font-size:0.88rem; font-weight:700;
  z-index:999; transition:transform 0.3s; white-space:nowrap;
  box-shadow:0 4px 20px #0006; border:1px solid #ffffff30;
}
.toast.show { transform:translateX(-50%) translateY(0); }

/* WHATSAPP FLOAT */
.wa-float {
  position:fixed; bottom:22px; left:20px; z-index:150;
  width:54px; height:54px; border-radius:50%;
  background:linear-gradient(135deg,#25d366,#128c7e);
  display:flex; align-items:center; justify-content:center;
  font-size:1.6rem; cursor:pointer; box-shadow:0 4px 16px #25d36650;
  transition:all 0.25s; text-decoration:none;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{box-shadow:0 4px 16px #25d36650} 50%{box-shadow:0 4px 24px #25d36690} }
.wa-float:hover { transform:scale(1.12); }

/* BACK TO TOP */
.back-top {
  position:fixed; bottom:22px; right:20px; z-index:150;
  width:44px; height:44px; border-radius:50%;
  background:linear-gradient(135deg,#f9a825,#f57f17); color:white;
  display:none; align-items:center; justify-content:center;
  font-size:1.2rem; cursor:pointer; box-shadow:0 3px 12px #0005;
  border:none; transition:all 0.25s;
}
.back-top.visible { display:flex; }
.back-top:hover { transform:scale(1.1); background:linear-gradient(135deg,#ff6f00,#e65100); }

@media(max-width:600px) {
  .search-bar { display:none; }
  .logo-text .main { font-size:0.9rem; }
  .hero h1 { font-size:1.4rem; }
  .product-grid { grid-template-columns:repeat(2,1fr); gap:10px; }
  .product-img, .product-img-placeholder { height:145px; }
  .contact-grid { grid-template-columns:1fr; }
  .hero-stats { gap:16px; }
  .social-links { gap:8px; }
  .social-btn { padding:6px 12px; font-size:0.75rem; }
}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-logo">📱 تويتي فون</div>
  <div class="splash-sub">الزعفرانية</div>
  <div class="splash-spinner"></div>
</div>

<header>
  <div class="header-inner">
    <div class="logo-wrap" onclick="scrollTo(0,0)">
      <img class="logo-img" id="headerLogo" src="" alt="شعار المتجر" style="display:none">
      <div class="logo-text">
        <span class="main" id="storeName">تويتي فون الزعفرانية</span>
        <span class="sub" id="storeTagline">ملتزمات الهاتف والسماعات والبورات</span>
      </div>
    </div>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="🔍 ابحث عن منتج..." oninput="filterProducts()">
    </div>
    <div class="header-actions">
      <button class="admin-btn" onclick="openModal('adminModal')">⚙️</button>
      <button class="cart-btn" onclick="openCartModal()">
        🛒 السلة <span class="cart-count" id="cartCount">0</span>
      </button>
    </div>
  </div>
</header>

<div class="hero">
  <div class="hero-icon">📱</div>
  <h1>مرحباً بك في <span id="heroStoreName">تويتي فون الزعفرانية</span></h1>
  <p id="heroDesc">ملتزمات الهاتف والسماعات والبورات والمزيد</p>
  <div class="hero-stats">
    <div class="hero-stat">
      <div class="hero-stat-num" id="statProducts">0</div>
      <div class="hero-stat-label">منتج</div>
    </div>
    <div class="hero-stat">
      <div class="hero-stat-num" id="statCats">0</div>
      <div class="hero-stat-label">فئة</div>
    </div>
    <div class="hero-stat">
      <div class="hero-stat-num">⚡</div>
      <div class="hero-stat-label">توصيل سريع</div>
    </div>
  </div>

  <!-- SOCIAL LINKS -->
  <div class="social-links" id="socialLinks">
    <!-- يتم إنشاؤها بواسطة JS -->
  </div>
</div>

<div class="address-bar" id="addressBar" onclick="openWhatsapp()"></div>

<div class="main">
  <div class="category-bar" id="categoryBar"></div>
  <div class="section-header">
    <div class="section-title">المنتجات</div>
    <div class="products-count" id="productsCount"></div>
  </div>
  <div class="product-grid" id="productGrid">
    <div class="no-products">⏳ جارٍ تحميل المنتجات...</div>
  </div>

  <!-- CONTACT -->
  <div class="contac
